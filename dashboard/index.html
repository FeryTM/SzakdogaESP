<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Szakdoga – RSSI Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.3px;
    }

    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      padding: 4px 12px;
      border-radius: 999px;
      font-weight: 600;
      transition: background 0.3s, color 0.3s;
    }
    #status-badge.active   { background: #14532d; color: #4ade80; }
    #status-badge.inactive { background: #3b1515; color: #f87171; }
    #status-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 14px;
      padding: 24px;
    }

    .card h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 20px;
    }

    /* --- Controls --- */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .control-label {
      font-size: 0.95rem;
      font-weight: 500;
      color: #cbd5e1;
    }

    .control-sub {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 2px;
    }

    /* Toggle switch */
    .toggle-wrap { display: flex; align-items: center; gap: 10px; }
    .toggle {
      position: relative;
      width: 52px;
      height: 28px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #374151;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      left: 4px; top: 4px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
    }
    .toggle input:checked + .toggle-slider { background: #2563eb; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(24px); }
    #toggle-state {
      font-size: 0.85rem;
      font-weight: 600;
      min-width: 52px;
      color: #94a3b8;
    }

    /* Calibrate button */
    #btn-calibrate {
      padding: 9px 20px;
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    #btn-calibrate:hover  { background: #2563eb; }
    #btn-calibrate:active { opacity: 0.8; }

    #last-calib {
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 8px;
    }

    /* --- RSSI Table --- */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    thead th {
      text-align: left;
      padding: 6px 10px;
      color: #475569;
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-bottom: 1px solid #2d3148;
    }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: #252840; }
    tbody td {
      padding: 10px 10px;
      border-bottom: 1px solid #1a1e2e;
      color: #cbd5e1;
    }
    tbody td:last-child { font-family: monospace; }

    .rssi-bar-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rssi-bar-bg {
      flex: 1;
      height: 6px;
      background: #2d3148;
      border-radius: 999px;
      overflow: hidden;
    }
    .rssi-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .rssi-val { font-weight: 700; font-size: 0.9rem; min-width: 56px; text-align: right; }

    /* --- Chart --- */
    .chart-card { grid-column: 1 / -1; }
    .chart-wrap { position: relative; height: 280px; }

    /* --- Refresh info --- */
    #refresh-info {
      text-align: right;
      font-size: 0.72rem;
      color: #475569;
      margin-top: 14px;
    }

    /* Notification toast */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.85rem;
      color: #e2e8f0;
      box-shadow: 0 8px 24px #00000066;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>📡 RSSI Dashboard</h1>
  <span id="status-badge" class="inactive">
    <span class="dot"></span>
    <span id="status-text">Betöltés...</span>
  </span>
</header>

<div class="grid">

  <!-- Vezérlők -->
  <div class="card">
    <h2>Vezérlők</h2>
    <div class="controls">

      <div class="control-row">
        <div>
          <div class="control-label">Mérés</div>
          <div class="control-sub">ESP-k adatküldése</div>
        </div>
        <div class="toggle-wrap">
          <span id="toggle-state">–</span>
          <label class="toggle">
            <input type="checkbox" id="toggle-measure" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="control-row">
        <div>
          <div class="control-label">Kalibráció</div>
          <div id="last-calib">Utolsó: –</div>
        </div>
        <button id="btn-calibrate">🔄 Újrakalibrál</button>
      </div>

    </div>
  </div>

  <!-- RSSI táblázat -->
  <div class="card">
    <h2>Utolsó mért értékek</h2>
    <table>
      <thead>
        <tr>
          <th>Mérő</th>
          <th>Cél</th>
          <th>RSSI</th>
          <th>Erősség</th>
        </tr>
      </thead>
      <tbody id="rssi-tbody">
        <tr><td colspan="4" style="color:#475569;padding:16px 10px">Betöltés...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Grafikon -->
  <div class="card chart-card">
    <h2>RSSI előzmények (utolsó 60 mérés)</h2>
    <div class="chart-wrap">
      <canvas id="rssi-chart"></canvas>
    </div>
  </div>

</div>

<div id="refresh-info">Frissítés: –</div>
<div id="toast"></div>

<script>
  const SUPABASE_URL      = 'https://fuabyfsracjmrykbnndg.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1YWJ5ZnNyYWNqbXJ5a2JubmRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDQwMjUsImV4cCI6MjA5NjE4MDAyNX0.Cp2naUYvwjv_KtiJCswUkc2ZWnHut-Ce9jbU0Ep66dQ';

  const HEADERS = {
    'apikey':        SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type':  'application/json',
  };

  // Node párok és hozzájuk rendelt színek a grafikonon
  const NODE_PAIRS = [
    { node: 'node1', target: 'node2', color: '#3b82f6' },
    { node: 'node1', target: 'node3', color: '#8b5cf6' },
    { node: 'node2', target: 'node1', color: '#10b981' },
    { node: 'node2', target: 'node3', color: '#f59e0b' },
    { node: 'node3', target: 'node1', color: '#ef4444' },
    { node: 'node3', target: 'node2', color: '#ec4899' },
  ];

  // RSSI → jelerősség szín (dBm skála: -50 jó, -80 gyenge, -100+ nagyon gyenge)
  function rssiColor(rssi) {
    if (rssi >= -60) return '#4ade80';
    if (rssi >= -75) return '#facc15';
    return '#f87171';
  }

  // RSSI → sáv szélesség (0-100% lineáris -100..-40 között)
  function rssiPercent(rssi) {
    return Math.max(0, Math.min(100, (rssi + 100) / 60 * 100));
  }

  // Supabase REST segédfüggvények
  async function supabaseGet(path) {
    const r = await fetch(SUPABASE_URL + path, { headers: HEADERS });
    if (!r.ok) throw new Error(`GET ${path} → ${r.status}`);
    return r.json();
  }
  async function supabasePatch(path, body) {
    const r = await fetch(SUPABASE_URL + path, {
      method: 'PATCH',
      headers: { ...HEADERS, 'Prefer': 'return=representation' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`PATCH ${path} → ${r.status}`);
    return r.json();
  }
  async function supabasePost(path, body) {
    const r = await fetch(SUPABASE_URL + path, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'return=representation' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`POST ${path} → ${r.status}`);
    return r.json();
  }

  // Toast értesítő
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // --- system_config ---
  let configId = null;

  async function loadConfig() {
    const rows = await supabaseGet('/rest/v1/system_config?select=*&limit=1');
    if (!rows.length) return;
    const cfg = rows[0];
    configId = cfg.id;

    const toggle = document.getElementById('toggle-measure');
    const state  = document.getElementById('toggle-state');
    const badge  = document.getElementById('status-badge');
    const statusText = document.getElementById('status-text');

    toggle.checked = cfg.measurement_active;
    state.textContent = cfg.measurement_active ? 'BE' : 'KI';
    state.style.color = cfg.measurement_active ? '#4ade80' : '#f87171';

    badge.className = 'active';
    if (cfg.measurement_active) {
      badge.classList.remove('inactive');
      statusText.textContent = 'Mérés aktív';
    } else {
      badge.classList.add('inactive');
      badge.classList.remove('active');
      statusText.textContent = 'Mérés inaktív';
    }

    if (cfg.last_calibration) {
      const d = new Date(cfg.last_calibration);
      document.getElementById('last-calib').textContent =
        'Utolsó: ' + d.toLocaleString('hu-HU');
    }
  }

  async function setMeasurementActive(val) {
    try {
      if (configId) {
        await supabasePatch(`/rest/v1/system_config?id=eq.${configId}`,
                            { measurement_active: val });
      } else {
        await supabasePost('/rest/v1/system_config',
                           { measurement_active: val });
      }
      await loadConfig();
      showToast(val ? '✅ Mérés bekapcsolva' : '⏹ Mérés leállítva');
    } catch(e) {
      showToast('❌ Hiba: ' + e.message);
    }
  }

  async function calibrate() {
    try {
      const now = new Date().toISOString();
      if (configId) {
        await supabasePatch(`/rest/v1/system_config?id=eq.${configId}`,
                            { last_calibration: now });
      } else {
        await supabasePost('/rest/v1/system_config',
                           { measurement_active: false, last_calibration: now });
      }
      await loadConfig();
      showToast('🔄 Kalibráció időbélyege frissítve');
    } catch(e) {
      showToast('❌ Hiba: ' + e.message);
    }
  }

  // --- RSSI táblázat ---
  async function loadTable() {
    // Minden node párhoz a legutolsó mért érték
    const rows = await supabaseGet(
      '/rest/v1/rssi_measurements?select=node_id,target_node_id,rssi,created_at' +
      '&order=created_at.desc&limit=200'
    );

    // Utolsó érték megkeresése minden párhoz
    const latest = {};
    for (const row of rows) {
      const key = row.node_id + '→' + row.target_node_id;
      if (!latest[key]) latest[key] = row;
    }

    const tbody = document.getElementById('rssi-tbody');
    if (!Object.keys(latest).length) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:#475569;padding:16px 10px">Még nincs adat</td></tr>';
      return;
    }

    tbody.innerHTML = NODE_PAIRS.map(pair => {
      const key = pair.node + '→' + pair.target;
      const row = latest[key];
      if (!row) return `
        <tr>
          <td>${pair.node}</td>
          <td>${pair.target}</td>
          <td colspan="2" style="color:#475569">–</td>
        </tr>`;
      const pct   = rssiPercent(row.rssi);
      const color = rssiColor(row.rssi);
      return `
        <tr>
          <td>${row.node_id}</td>
          <td>${row.target_node_id}</td>
          <td>
            <div class="rssi-bar-wrap">
              <div class="rssi-bar-bg">
                <div class="rssi-bar-fill" style="width:${pct}%;background:${color}"></div>
              </div>
              <span class="rssi-val" style="color:${color}">${row.rssi} dBm</span>
            </div>
          </td>
          <td style="color:#475569;font-size:0.75rem">
            ${new Date(row.created_at).toLocaleTimeString('hu-HU')}
          </td>
        </tr>`;
    }).join('');
  }

  // --- Grafikon ---
  const ctx = document.getElementById('rssi-chart').getContext('2d');
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: NODE_PAIRS.map(pair => ({
        label: `${pair.node}→${pair.target}`,
        data: [],
        borderColor: pair.color,
        backgroundColor: pair.color + '22',
        borderWidth: 2,
        pointRadius: 2,
        tension: 0.3,
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      scales: {
        x: {
          ticks: { color: '#475569', maxTicksLimit: 10, maxRotation: 0 },
          grid:  { color: '#1e2536' },
        },
        y: {
          title: { display: true, text: 'RSSI (dBm)', color: '#475569' },
          ticks: { color: '#475569' },
          grid:  { color: '#1e2536' },
        }
      },
      plugins: {
        legend: { labels: { color: '#94a3b8', boxWidth: 12, padding: 16 } },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} dBm`
          }
        }
      }
    }
  });

  async function loadChart() {
    const rows = await supabaseGet(
      '/rest/v1/rssi_measurements?select=node_id,target_node_id,rssi,created_at' +
      '&order=created_at.desc&limit=360'
    );
    rows.reverse();

    // Idő-tengelyhez egyedi labelek
    const labels = [...new Set(rows.map(r =>
      new Date(r.created_at).toLocaleTimeString('hu-HU')
    ))];

    chart.data.labels = labels;

    NODE_PAIRS.forEach((pair, i) => {
      const pairRows = rows.filter(r =>
        r.node_id === pair.node && r.target_node_id === pair.target
      );
      // Illesztés a label-ekhez
      const dataMap = {};
      pairRows.forEach(r => {
        dataMap[new Date(r.created_at).toLocaleTimeString('hu-HU')] = r.rssi;
      });
      chart.data.datasets[i].data = labels.map(l => dataMap[l] ?? null);
    });

    chart.update();
  }

  // --- Automatikus frissítés ---
  async function refresh() {
    try {
      await Promise.all([loadConfig(), loadTable(), loadChart()]);
      document.getElementById('refresh-info').textContent =
        'Utoljára frissítve: ' + new Date().toLocaleTimeString('hu-HU') +
        ' · automatikus frissítés: 5 mp';
    } catch(e) {
      console.error(e);
    }
  }

  // Eseménykezelők
  document.getElementById('toggle-measure').addEventListener('change', e => {
    setMeasurementActive(e.target.checked);
  });
  document.getElementById('btn-calibrate').addEventListener('click', calibrate);

  // Indítás
  refresh();
  setInterval(refresh, 5000);
</script>

</body>
</html>
